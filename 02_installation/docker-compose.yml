services:
  omop-postgres:
    image: postgres:16
    container_name: omop-postgres
    environment:
      POSTGRES_USER: omop
      POSTGRES_PASSWORD: omop
      POSTGRES_DB: omop
    ports:
      - "5432:5432"
    volumes:
      - omop_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  omop_pgdata: